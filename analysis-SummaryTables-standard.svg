      </cc:License>
    </rdf:RDF>
  </metadata>

  <!-- 4x4 grid: white fill, colored strokes, visible gaps -->
  <!-- Cells: 10w x 6h, stroke 2.5px, 4px gap (1.5px visible between borders) -->
  <!-- Cols: x=11,25,39,53  Rows: y=4,14,24,34 -->
  <g fill="#fff" stroke-width="2.5">

    <!-- Header Row: dark blue -->
    <rect x="11" y="4"  width="10" height="6" stroke="#3e6da9"/>
    <rect x="25" y="4"  width="10" height="6" stroke="#3e6da9"/>
    <rect x="39" y="4"  width="10" height="6" stroke="#3e6da9"/>
    <rect x="53" y="4"  width="10" height="6" stroke="#3e6da9"/>

    <!-- Row 1: key=blue, data=gray, summary=amber -->
    <rect x="11" y="14" width="10" height="6" stroke="#6b9de8"/>
    <rect x="25" y="14" width="10" height="6" stroke="#acacac"/>
    <rect x="39" y="14" width="10" height="6" stroke="#acacac"/>
    <rect x="53" y="14" width="10" height="6" stroke="#e6ac40"/>

    <!-- Row 2 -->
    <rect x="11" y="24" width="10" height="6" stroke="#6b9de8"/>
    <rect x="25" y="24" width="10" height="6" stroke="#acacac"/>
    <rect x="39" y="24" width="10" height="6" stroke="#acacac"/>
    <rect x="53" y="24" width="10" height="6" stroke="#e6ac40"/>

    <!-- Row 3 -->
    <rect x="11" y="34" width="10" height="6" stroke="#6b9de8"/>
    <rect x="25" y="34" width="10" height="6" stroke="#acacac"/>
    <rect x="39" y="34" width="10" height="6" stroke="#acacac"/>
    <rect x="53" y="34" width="10" height="6" stroke="#e6ac40"/>

  </g>
</svg>
