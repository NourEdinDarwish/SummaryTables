title: Table Summary
name: tblSummary
jus: '3.0'
stage: 0
compilerMode: tame
events:
  update: ./tblsummary.events::update
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Continuous Variables
        children:
          - type: VariablesListBox
            name: vars_cont
            isTarget: true
            events:
              change: ./tblsummary.events::onChange_vars_cont
      - type: TargetLayoutBox
        label: Categorical Variables
        children:
          - type: VariablesListBox
            name: vars_cat
            isTarget: true
            events:
              change: ./tblsummary.events::onChange_vars_cat
      - type: TargetLayoutBox
        label: Group by
        children:
          - type: VariablesListBox
            name: by
            maxItemCount: 1
            isTarget: true

  - type: CollapseBox
    label: Statistics
    collapsed: true
    children:
      - type: Label
        label: Continuous Variables
      - type: LayoutBox
        children:
          - type: ComboBox
            name: stat_cont_global
      - type: ListBox
        name: stats_cont_specific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: large
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            template:
              type: VariableLabel
          - name: stat
            label: Statistic
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ''

      - type: Label
        label: Categorical Variables
        margin: large
      - type: LayoutBox
        children:
          - type: ComboBox
            name: stat_cat_global
      - type: ListBox
        name: stats_cat_specific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: large
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            template:
              type: VariableLabel
          - name: stat
            label: Statistic
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ''

  - type: CollapseBox
    label: Options
    children:
      - type: LayoutBox
        children:
          - type: ComboBox
            name: missing
      - type: LayoutBox
        children:
          - type: TextBox
            name: missingText
            format: string
      - type: LayoutBox
        children:
          - type: ComboBox
            name: percent
      - type: LayoutBox
        children:
          - type: CheckBox
            name: p_value

  - type: CollapseBox
    label: Export
    collapsed: true
    children:
      - type: LayoutBox
        children:
          - type: CheckBox
            name: exportWord
      - type: LayoutBox
        children:
          - type: TextBox
            name: exportPath
            format: string
