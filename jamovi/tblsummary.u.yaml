title: Table Summary
name: tblSummary
jus: "3.0"
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: varsCont
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: varsCat
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: groupBy
            maxItemCount: 1
            isTarget: true
  - type: CollapseBox
    label: General
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: addN
        children:
          - type: CheckBox
            name: addNLast
            enable: (addN)
          - type: CheckBox
            name: addNFootnote
            enable: (addN)
      - type: CheckBox
        name: addOverall
        enable: ({return !!ui['groupBy'].value();})
        children:
          - type: CheckBox
            name: addOverallLast
            enable: ({return !!ui['groupBy'].value() && ui['addOverall'].value();})
      - type: Label
        label: Missing Values
        children:
          - type: ComboBox
            name: missing
          - type: TextBox
            name: missingText
            format: string
            width: large
            enable: (!(missing:no))
          - type: ComboBox
            name: missingStat
            enable: (!(missing:no))
  - type: CollapseBox
    label: Appearance
    collapsed: true
    stretchFactor: 1
    children:
      - type: ComboBox
        name: journal
      - type: CheckBox
        name: compact
      - type: ComboBox
        name: language
      - type: LayoutBox
        fitToGrid: true
        children:
          - type: CheckBox
            name: boldLabels
            cell:
              row: 0
              column: 0
          - type: CheckBox
            name: boldLevels
            cell:
              row: 0
              column: 1
          - type: CheckBox
            name: italicizeLabels
            cell:
              row: 1
              column: 0
          - type: CheckBox
            name: italicizeLevels
            cell:
              row: 1
              column: 1
  - type: CollapseBox
    label: Level Order
    collapsed: true
    stretchFactor: 1
    children:
      - type: ComboBox
        name: sortCatDefault
      - type: ListBox
        name: sortCatSpecific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: large
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            maxWidth: 300
            template:
              type: VariableLabel
          - name: sort
            label: Level Order
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ""
  - type: CollapseBox
    label: Statistics
    collapsed: true
    stretchFactor: 1
    children:
      - type: Label
        label: Continuous Variables
        stretchFactor: 1
        children:
          - type: ComboBox
            name: statContDefault
          - type: ListBox
            name: statsContSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: large
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: stat
                label: Statistic
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
          - type: ComboBox
            name: digitsCont
      - type: Label
        label: Categorical Variables
        stretchFactor: 1
        children:
          - type: ComboBox
            name: statCatDefault
          - type: ListBox
            name: statsCatSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: large
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: stat
                label: Statistic
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
          - type: ComboBox
            name: digitsPct
          - type: ComboBox
            name: percent
            enable: ({return !!ui['groupBy'].value();})
  - type: CollapseBox
    label: P-value
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: pValue
            enable: ({return !!ui['groupBy'].value();})
          - type: ComboBox
            name: digitsPvalue
            enable: (pValue)
          - type: CheckBox
            name: boldP
            enable: (pValue)
            children:
              - type: TextBox
                name: boldPThreshold
                format: number
                enable: (pValue && boldP)
          - type: CheckBox
            name: separatePFootnotes
            enable: (pValue)
      - type: Label
        label: Continuous Variables
        stretchFactor: 1
        children:
          - type: ComboBox
            name: testContDefault
            enable: (pValue)
          - type: ListBox
            name: testsContSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: normal
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: test
                label: Test
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
      - type: Label
        label: Categorical Variables
        stretchFactor: 1
        children:
          - type: ComboBox
            name: testCatDefault
            enable: (pValue)
          - type: ListBox
            name: testsCatSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: normal
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: test
                label: Test
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
  - type: CollapseBox
    label: Q-value (P-value Adjustment)
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: addQ
        enable: (pValue)
      - type: ComboBox
        name: qMethod
        enable: (pValue && addQ)
      - type: CheckBox
        name: boldQ
        enable: (pValue && addQ)
        children:
          - type: TextBox
            name: boldQThreshold
            format: number
            enable: (pValue && addQ && boldQ)
  - type: CollapseBox
    label: Save to Word
    collapsed: true
    stretchFactor: 1
    children:
      - type: TextBox
        name: path
        format: string
        stretchFactor: 1
      - type: CheckBox
        name: export
