name: tblSummary
title: Summary Table
jus: "3.0"
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: varsCont
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: varsCat
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: groupVar
            maxItemCount: 1
            isTarget: true
  - type: CollapseBox
    label: General
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: addN
        children:
          - type: CheckBox
            name: addNLast
            enable: (addN)
          - type: CheckBox
            name: addNFootnote
            enable: (addN)
      - type: CheckBox
        name: addOverall
        enable: ({return !!ui['groupVar'].value();})
        children:
          - type: CheckBox
            name: addOverallLast
            enable: ({return !!ui['groupVar'].value() && ui['addOverall'].value();})
      - type: Label
        label: Missing Values
        children:
          - type: ComboBox
            name: missing
          - type: TextBox
            name: missingText
            format: string
            width: large
            enable: (!(missing:no))
          - type: ComboBox
            name: missingStat
            enable: (!(missing:no))
  - type: CollapseBox
    label: Appearance
    collapsed: true
    stretchFactor: 1
    children:
      - type: ComboBox
        name: journal
      - type: CheckBox
        name: compact
      - type: ComboBox
        name: language
      - type: LayoutBox
        fitToGrid: true
        children:
          - type: CheckBox
            name: boldLabels
            cell:
              row: 0
              column: 0
          - type: CheckBox
            name: boldLevels
            cell:
              row: 0
              column: 1
          - type: CheckBox
            name: italicizeLabels
            cell:
              row: 1
              column: 0
          - type: CheckBox
            name: italicizeLevels
            cell:
              row: 1
              column: 1
  - type: CollapseBox
    label: Level Order
    collapsed: true
    stretchFactor: 1
    children:
      - type: ComboBox
        name: sortCatDefault
      - type: ListBox
        name: sortCatSpecific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: large
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            maxWidth: 300
            template:
              type: VariableLabel
          - name: sort
            label: Level Order
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ""
  - type: CollapseBox
    label: Statistics
    collapsed: true
    stretchFactor: 1
    children:
      - type: Label
        label: Continuous Variables
        stretchFactor: 1
        children:
          - type: ComboBox
            name: statContDefault
          - type: ListBox
            name: statContSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: large
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: stat
                label: Statistic
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
          - type: ComboBox
            name: digitsCont
      - type: Label
        label: Categorical Variables
        stretchFactor: 1
        children:
          - type: LayoutBox
            margin: none
            children:
              - type: ComboBox
                name: statCatDefault
          - type: ListBox
            name: statCatSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: large
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: stat
                label: Statistic
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
          - type: LayoutBox
            margin: none
            children:
              - type: ComboBox
                name: digitsCatPct
          - type: LayoutBox
            margin: none
            children:
              - type: ComboBox
                name: percent
                enable: ({return !!ui['groupVar'].value();})
  - type: CollapseBox
    label: Difference
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: addDifference
            enable: ({return !!ui['groupVar'].value();})
          - type: LayoutBox
            margin: none
            children:
              - type: TextBox
                name: diffConfLevel
                suffix: "%"
                format: number
                enable: ({return !!ui['groupVar'].value() && ui['addDifference'].value();})
          - type: LayoutBox
            margin: none
            children:
              - type: ComboBox
                name: diffDigitsPvalue
                enable: ({return !!ui['groupVar'].value() && ui['addDifference'].value();})
          - type: CheckBox
            name: boldDiffPvalue
            enable: ({return !!ui['groupVar'].value() && ui['addDifference'].value();})
            children:
              - type: TextBox
                name: boldDiffPvalueThreshold
                format: number
                enable: ({return !!ui['groupVar'].value() && ui['addDifference'].value() && ui['boldDiffPvalue'].value();})
          - type: CheckBox
            name: separateDiffPFootnotes
            enable: ({return !!ui['groupVar'].value() && ui['addDifference'].value();})
      - type: Label
        label: Continuous Variables
        stretchFactor: 1
        children:
          - type: LayoutBox
            margin: none
            children:
              - type: ComboBox
                name: diffContDefault
                enable: ({return !!ui['groupVar'].value() && ui['addDifference'].value();})
          - type: ListBox
            name: diffContSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: normal
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: method
                label: Method
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
          - type: ComboBox
            name: diffDigitsCont
            enable: ({return !!ui['groupVar'].value() && ui['addDifference'].value();})
      - type: Label
        label: Categorical Variables (2 levels)
        stretchFactor: 1
        children:
          - type: LayoutBox
            margin: none
            children:
              - type: ComboBox
                name: diffDichotDefault
                enable: ({return !!ui['groupVar'].value() && ui['addDifference'].value();})
          - type: ListBox
            name: diffDichotSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: normal
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: method
                label: Method
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
          - type: ComboBox
            name: diffDigitsDichot
            enable: ({return !!ui['groupVar'].value() && ui['addDifference'].value();})
      - type: Label
        label: Categorical Variables (3+ levels; always SMD)
        stretchFactor: 1
        children:
          - type: ComboBox
            name: diffDigitsCat
            enable: ({return !!ui['groupVar'].value() && ui['addDifference'].value();})
  - type: CollapseBox
    label: P-value
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: addPvalue
            enable: ({return !!ui['groupVar'].value();})
          - type: LayoutBox
            margin: none
            children:
              - type: ComboBox
                name: digitsPvalue
                enable: ({return !!ui['groupVar'].value() && ui['addPvalue'].value();})
          - type: CheckBox
            name: boldPvalue
            enable: ({return !!ui['groupVar'].value() && ui['addPvalue'].value();})
            children:
              - type: TextBox
                name: boldPvalueThreshold
                format: number
                enable: ({return !!ui['groupVar'].value() && ui['addPvalue'].value() && ui['boldPvalue'].value();})
          - type: CheckBox
            name: separatePvalueFootnotes
            enable: ({return !!ui['groupVar'].value() && ui['addPvalue'].value();})
      - type: Label
        label: Continuous Variables
        stretchFactor: 1
        children:
          - type: ComboBox
            name: testContDefault
            enable: ({return !!ui['groupVar'].value() && ui['addPvalue'].value();})
          - type: ListBox
            name: testContSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: normal
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: test
                label: Test
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
      - type: Label
        label: Categorical Variables
        stretchFactor: 1
        children:
          - type: ComboBox
            name: testCatDefault
            enable: ({return !!ui['groupVar'].value() && ui['addPvalue'].value();})
          - type: ListBox
            name: testCatSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: normal
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: test
                label: Test
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
  - type: CollapseBox
    label: Q-value (P-value Adjustment)
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: addQ
        enable: ({return !!ui['groupVar'].value() && (ui['addPvalue'].value() || ui['addDifference'].value());})
      - type: ComboBox
        name: qMethod
        enable: ({return !!ui['groupVar'].value() && (ui['addPvalue'].value() || ui['addDifference'].value()) && ui['addQ'].value();})
      - type: CheckBox
        name: boldQ
        enable: ({return !!ui['groupVar'].value() && (ui['addPvalue'].value() || ui['addDifference'].value()) && ui['addQ'].value();})
        children:
          - type: TextBox
            name: boldQThreshold
            format: number
            enable: ({return !!ui['groupVar'].value() && (ui['addPvalue'].value() || ui['addDifference'].value()) && ui['addQ'].value() && ui['boldQ'].value();})
  - type: CollapseBox
    label: Confidence Interval
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: addCi
          - type: LayoutBox
            margin: none
            children:
              - type: TextBox
                name: confLevel
                suffix: "%"
                format: number
                enable: (addCi)
          - type: CheckBox
            name: ciCombine
            enable: (addCi)
      - type: Label
        label: Continuous Variables
        stretchFactor: 1
        children:
          - type: ComboBox
            name: ciContDefault
            enable: (addCi)
          - type: ListBox
            name: ciContSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: large
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: method
                label: Method
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
          - type: ComboBox
            name: ciDigitsCont
            enable: (addCi)
      - type: Label
        label: Categorical Variables
        stretchFactor: 1
        children:
          - type: ComboBox
            name: ciCatDefault
            enable: (addCi)
          - type: ListBox
            name: ciCatSpecific
            showColumnHeaders: true
            fullRowSelect: true
            stretchFactor: 1
            height: large
            columns:
              - name: var
                label: Variable
                selectable: false
                stretchFactor: 1
                maxWidth: 300
                template:
                  type: VariableLabel
              - name: method
                label: Method
                selectable: false
                stretchFactor: 1
                template:
                  type: ComboBox
                  label: ""
          - type: ComboBox
            name: ciDigitsCat
            enable: (addCi)
  - type: CollapseBox
    label: Save to Word
    collapsed: true
    stretchFactor: 1
    children:
      - type: TextBox
        name: path
        format: string
        stretchFactor: 1
      - type: CheckBox
        name: export
  - type: CollapseBox
    label: Help
    collapsed: true
    stretchFactor: 1
    children:
      - type: Label
        label: Documentation coming soon.
        heading: true
      - type: Label
        label: This module is actively being developed.
        heading: false
      - type: Label
        label: "If you encounter any issues, have a question, or have ideas for new features,"
        heading: false
      - type: Label
        label: please open an issue at github.com/NourEdinDarwish/SummaryTables/issues
        heading: false
      - type: Label
        label: or contact me via email at nouredindarwish@gmail.com.
        heading: false
