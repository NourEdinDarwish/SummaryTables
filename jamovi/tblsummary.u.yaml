title: Table Summary
name: tblSummary
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variables
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
      - type: TargetLayoutBox
        label: Group by
        children:
          - type: VariablesListBox
            name: by
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: statistic
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: missing
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: missingText
        format: string
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: percent
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: p_value
      - type: CheckBox
        name: exportWord
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: exportPath
        format: string
