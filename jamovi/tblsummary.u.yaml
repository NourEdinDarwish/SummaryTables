title: Table Summary
name: tblSummary
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Continuous Variables
        children:
          - type: VariablesListBox
            name: varsCont
            isTarget: true
      - type: TargetLayoutBox
        label: Categorical Variables
        children:
          - type: VariablesListBox
            name: varsCat
            isTarget: true
      - type: TargetLayoutBox
        label: Group by
        children:
          - type: VariablesListBox
            name: groupBy
            maxItemCount: 1
            isTarget: true
  - type: CollapseBox
    label: Options
    children:
      - type: LayoutBox
        children:
          - type: ComboBox
            name: missing
      - type: LayoutBox
        children:
          - type: TextBox
            name: missingText
            format: string
            width: large
      - type: LayoutBox
        children:
          - type: ComboBox
            name: percent
  - type: CollapseBox
    label: Appearance
    collapsed: true
    children:
      - type: LayoutBox
        children:
          - type: ComboBox
            name: journal
      - type: LayoutBox
        children:
          - type: CheckBox
            name: compact
      - type: LayoutBox
        children:
          - type: ComboBox
            name: language
      - type: Label
        label: Text Formatting
        margin: large
      - type: LayoutBox
        children:
          - type: CheckBox
            name: boldLabels
          - type: CheckBox
            name: boldLevels
      - type: LayoutBox
        children:
          - type: CheckBox
            name: italicizeLabels
          - type: CheckBox
            name: italicizeLevels
  - type: CollapseBox
    label: Category Order
    collapsed: true
    children:
      - type: LayoutBox
        children:
          - type: ComboBox
            name: sortCatDefault
      - type: ListBox
        name: sortCatSpecific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: normal
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            template:
              type: VariableLabel
          - name: sort
            label: Order
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ''
  - type: CollapseBox
    label: Statistics
    collapsed: true
    children:
      - type: Label
        label: Continuous Variables
      - type: LayoutBox
        children:
          - type: ComboBox
            name: statContDefault
      - type: ListBox
        name: statsContSpecific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: normal
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            template:
              type: VariableLabel
          - name: stat
            label: Statistic
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ''
      - type: LayoutBox
        children:
          - type: ComboBox
            name: digitsCont
      - type: Label
        label: Categorical Variables
        margin: large
      - type: LayoutBox
        children:
          - type: ComboBox
            name: statCatDefault
      - type: ListBox
        name: statsCatSpecific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: normal
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            template:
              type: VariableLabel
          - name: stat
            label: Statistic
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ''
      - type: LayoutBox
        children:
          - type: ComboBox
            name: digitsPct
  - type: CollapseBox
    label: P-value
    collapsed: true
    children:
      - type: LayoutBox
        children:
          - type: CheckBox
            name: pValue
      - type: LayoutBox
        children:
          - type: ComboBox
            name: digitsPvalue
      - type: LayoutBox
        children:
          - type: CheckBox
            name: boldP
      - type: LayoutBox
        children:
          - type: TextBox
            name: boldPThreshold
            format: number
            enable: (boldP)
      - type: LayoutBox
        children:
          - type: CheckBox
            name: separatePFootnotes
      - type: Label
        label: Continuous Variables
      - type: LayoutBox
        children:
          - type: ComboBox
            name: testContDefault
      - type: ListBox
        name: testsContSpecific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: normal
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            template:
              type: VariableLabel
          - name: test
            label: Test
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ''
      - type: Label
        label: Categorical Variables
      - type: LayoutBox
        children:
          - type: ComboBox
            name: testCatDefault
      - type: ListBox
        name: testsCatSpecific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: normal
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            template:
              type: VariableLabel
          - name: test
            label: Test
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ' '
  - type: CollapseBox
    label: Export
    collapsed: true
    children:
      - type: LayoutBox
        children:
          - type: TextBox
            name: path
            format: string
            width: largest
      - type: LayoutBox
        children:
          - type: CheckBox
            name: export
