---
title: Publication-Ready Summary Tables
name: SummaryTables
version: 0.3.0
jms: '1.0'
authors:
  - Nour Edin Darwish
maintainer: Nour Edin Darwish <nouredindarwish@gmail.com>
date: '2026-02-23'
type: R
description: >-
  Create publication-ready summary tables for descriptive statistics and group
  comparisons. Supports continuous and categorical variables with a wide range
  of summary statistics (mean, median, IQR, frequencies, and more). Includes
  statistical testing (t-tests, ANOVA, Wilcoxon, Chi-square, Fisher's exact),
  effect sizes (Cohen's d, Hedge's g, SMD), confidence intervals, p-value
  adjustment (Benjamini-Hochberg, Bonferroni, and others), and journal-specific
  formatting (JAMA, Lancet, NEJM, QJE). Tables can be exported to Word (.docx).
  Supports 16 languages. Based on the gtsummary R package.
analyses:
  - title: Summary Table
    name: tblSummary
    ns: SummaryTables
    menuGroup: Summary Tables
    menuTitle: Summary Table
    category: analyses
    description: >-
      Summarize continuous and categorical variables with descriptive
      statistics, optionally split by a grouping variable (Table 1 style).
      Includes statistical tests, effect sizes, confidence intervals, and
      p-value adjustment.
  - title: Continuous Table
    name: tblContinuous
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Continuous Table
    description: >-
      Summarize a single continuous variable across levels of one or more
      categorical variables. Useful for stratified descriptive summaries with
      flexible statistics and overall columns.
  - title: Cross Table
    name: tblCross
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Cross Table
    description: >-
      Cross-tabulate two categorical variables with counts, percentages, row and
      column margins, and statistical testing.
  - title: Likert Table
    name: tblLikert
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Likert Table
    description: >-
      Display response distributions for ordered categorical (Likert-type) items
      with per-item statistics and counts.
usesNative: true
minApp: 1.0.8

...
