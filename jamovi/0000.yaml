---
title: Publication-Ready Summary Tables
name: SummaryTables
version: 0.1.0
jms: '1.0'
authors:
  - Nour Edin Darwish
maintainer: Nour Edin Darwish <nouredindarwish@gmail.com>
date: '2026-02-23'
type: R
description: >-
  Create presentation-ready summary tables for descriptive statistics and group
  comparisons. Supports continuous and categorical variables with a wide range
  of summary statistics (mean, median, IQR, frequencies, and more). Includes
  statistical testing (t-tests, ANOVA, Wilcoxon, Chi-square, Fisher's exact),
  effect sizes (Cohen's d, Hedge's g, SMD), confidence intervals, p-value
  adjustment (Benjamini-Hochberg, Bonferroni, and others), and journal-specific
  formatting (JAMA, Lancet, NEJM, QJE). Tables can be exported to Word (.docx).
  Supports 16 languages. Based on the gtsummary R package.
analyses:
  - title: Summary Table
    name: tblSummary
    ns: SummaryTables
    menuGroup: Summary Tables
    menuTitle: Summary Table
    category: analyses
    description: >-
      Create a publication-ready summary table with descriptive statistics,
      group comparisons, statistical tests, effect sizes, confidence intervals,
      and journal-specific formatting. Export to Word.
  - title: Cross Table
    name: tblCross
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Cross Table
    description: >-
      Create a cross-tabulation of two categorical variables with counts,
      percentages, margins, p-values, and journal-specific formatting. Export to
      Word.
usesNative: true
