---
title: Publication-Ready Summary Tables
name: SummaryTables
version: 0.3.2
jms: '1.0'
authors:
  - Nour Edin Darwish
maintainer: Nour Edin Darwish <nouredindarwish@gmail.com>
date: '2026-03-30'
type: R
description: >-
  A comprehensive module for creating publication-ready summary and regression
  tables in jamovi, powered by gtsummary. <ul> <li><b>Summary Table:</b> Create
  classic "Table 1" summaries with group comparisons, automatic statistical
  testing, effect sizes, and p-value adjustments.</li> <li><b>Continuous
  Table:</b> Summarize a single continuous variable across multiple categorical
  variables with automatic statistical testing and p-value adjustments.</li>
  <li><b>Cross Table:</b> Summarize the association between two categorical
  variables using cross-tabulations with automatic statistical testing.</li>
  <li><b>Likert Table:</b> Summarize Likert scale items.</li>
  <li><b>Multivariable Regression:</b> Fit multivariable linear or logistic
  regression models.</li> <li><b>Univariable Regression:</b> Run separate
  univariable linear or logistic regression models for each predictor.</li>
  </ul> Features include 16 languages and pre-built formatting for major
  journals (JAMA, The Lancet, NEJM, QJE).
analyses:
  - title: Summary Table
    name: tblSummary
    ns: SummaryTables
    menuGroup: Summary Tables
    menuTitle: Summary Table
    category: analyses
    description: >-
      Summarize continuous and categorical variables with descriptive
      statistics, optionally split by a grouping variable (Table 1 style).
      Includes statistical tests, effect sizes, confidence intervals, and
      p-value adjustment.
  - title: Continuous Table
    name: tblContinuous
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Continuous Table
    description: >-
      Summarize a single continuous variable across levels of one or more
      categorical variables. Useful for stratified descriptive summaries with
      flexible statistics and overall columns.
  - title: Cross Table
    name: tblCross
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Cross Table
    description: >-
      Cross-tabulate two categorical variables with counts, percentages, row and
      column margins, and statistical testing.
  - title: Likert Table
    name: tblLikert
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Likert Table
    description: >-
      Display response distributions for ordered categorical (Likert-type) items
      with per-item statistics and counts.
  - title: Multivariable Linear Regression
    name: tblRegLinear
    ns: SummaryTables
    menuGroup: Summary Tables
    menuSubgroup: Multivariable Regression
    menuTitle: Linear Regression
    category: analyses
    description: >-
      Fit a multivariable linear regression model and display a
      publication-ready coefficient table with estimates, confidence intervals,
      and p-values. Includes global p-values, variance inflation factors, model
      fit statistics, significance stars, and p-value adjustments.
  - title: Multivariable Logistic Regression
    name: tblRegLogistic
    ns: SummaryTables
    menuGroup: Summary Tables
    menuSubgroup: Multivariable Regression
    menuTitle: Logistic Regression
    menuSubtitle: Binomial
    category: analyses
    description: >-
      Fit a multivariable logistic regression model and display a
      publication-ready coefficient table with odds ratios, confidence
      intervals, and p-values. Includes global p-values, event counts, variance
      inflation factors, model fit statistics, significance stars, and p-value
      adjustments.
  - title: Univariable Linear Regression
    name: tblUniRegLinear
    ns: SummaryTables
    menuGroup: Summary Tables
    menuSubgroup: Univariable Regression
    menuTitle: Linear Regression
    category: analyses
    description: >-
      Run separate univariable linear regression models for each predictor
      against a continuous outcome and display a publication-ready table with
      estimates, confidence intervals, and p-values. Includes global p-values,
      significance stars, and p-value adjustments.
  - title: Univariable Logistic Regression
    name: tblUniRegLogistic
    ns: SummaryTables
    menuGroup: Summary Tables
    menuSubgroup: Univariable Regression
    menuTitle: Logistic Regression
    menuSubtitle: Binomial
    category: analyses
    description: >-
      Run separate univariable logistic regression models for each predictor
      against a binary outcome and display a publication-ready table with odds
      ratios, confidence intervals, and p-values. Includes global p-values,
      event counts, significance stars, and p-value adjustments.
usesNative: true
minApp: 1.0.8

...
