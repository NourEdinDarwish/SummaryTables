---
title: Publication-Ready Summary Tables
name: SummaryTables
version: 0.3.0
jms: '1.0'
authors:
  - Nour Edin Darwish
maintainer: Nour Edin Darwish <nouredindarwish@gmail.com>
date: '2026-03-07'
type: R
description: >-
  Summary tables and descriptive statistics for jamovi. Create Table 1 with
  group comparisons, cross tabulations, and Likert-scale summaries. Supports
  continuous variables (mean, SD, median, IQR, range) and categorical variables
  (counts, percentages, frequencies). Statistical tests include t-test, ANOVA,
  Wilcoxon rank-sum, Kruskal-Wallis, Chi-square, Fisher's exact test, and Z test
  for proportions. Effect sizes include Cohen's d, Hedge's g, and standardized
  mean difference (SMD). Confidence intervals for means and proportions (Wilson,
  Clopper-Pearson, Wald, Agresti-Coull, Jeffreys). P values with adjustment
  methods including Bonferroni, Benjamini-Hochberg, Holm, and others. Export
  tables to Word (.docx). Missing data handling with customizable labels.
  Journal formatting (JAMA, The Lancet, NEJM, QJE). Per-variable control over
  statistics, tests, and methods. 16 languages. Built on gtsummary.
analyses:
  - title: Summary Table
    name: tblSummary
    ns: SummaryTables
    menuGroup: Summary Tables
    menuTitle: Summary Table
    category: analyses
    description: >-
      Summarize continuous and categorical variables with descriptive
      statistics, optionally split by a grouping variable (Table 1 style).
      Includes statistical tests, effect sizes, confidence intervals, and
      p-value adjustment.
  - title: Continuous Table
    name: tblContinuous
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Continuous Table
    description: >-
      Summarize a single continuous variable across levels of one or more
      categorical variables. Useful for stratified descriptive summaries with
      flexible statistics and overall columns.
  - title: Cross Table
    name: tblCross
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Cross Table
    description: >-
      Cross-tabulate two categorical variables with counts, percentages, row and
      column margins, and statistical testing.
  - title: Likert Table
    name: tblLikert
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Likert Table
    description: >-
      Display response distributions for ordered categorical (Likert-type) items
      with per-item statistics and counts.
usesNative: true
minApp: 1.0.8

