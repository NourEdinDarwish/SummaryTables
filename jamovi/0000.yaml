---
title: Publication-Ready Summary Tables
name: SummaryTables
version: 0.3.1
jms: '1.0'
authors:
  - Nour Edin Darwish
maintainer: Nour Edin Darwish <nouredindarwish@gmail.com>
date: '2026-03-07'
type: R
description: >-
  A comprehensive module for creating publication-ready summary tables in
  jamovi, powered by gtsummary. Includes four key analyses: <ul> <li><b>Summary
  Table:</b> Create classic "Table 1" summaries. Includes group comparisons with
  automatic statistical testing, effect sizes, and p-value adjustments.</li>
  <li><b>Continuous Table:</b> Summarize a single continuous outcome stratified
  across multiple categorical variables. Includes automatic statistical
  testing,  and p-value adjustments.</li> <li><b>Cross Table:</b> Summarize the
  association between two categorical variables using cross-tabulations.
  Includes automatic  statistical testing.</li> <li><b>Likert Table:</b>
  Summarize Likert scale items.</li> </ul> Features include 16 languages and
  pre-built formatting for major journals (JAMA, The Lancet, NEJM, QJE).
analyses:
  - title: Summary Table
    name: tblSummary
    ns: SummaryTables
    menuGroup: Summary Tables
    menuTitle: Summary Table
    category: analyses
    description: >-
      Summarize continuous and categorical variables with descriptive
      statistics, optionally split by a grouping variable (Table 1 style).
      Includes statistical tests, effect sizes, confidence intervals, and
      p-value adjustment.
  - title: Continuous Table
    name: tblContinuous
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Continuous Table
    description: >-
      Summarize a single continuous variable across levels of one or more
      categorical variables. Useful for stratified descriptive summaries with
      flexible statistics and overall columns.
  - title: Cross Table
    name: tblCross
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Cross Table
    description: >-
      Cross-tabulate two categorical variables with counts, percentages, row and
      column margins, and statistical testing.
  - title: Likert Table
    name: tblLikert
    ns: SummaryTables
    category: analyses
    menuGroup: Summary Tables
    menuTitle: Likert Table
    description: >-
      Display response distributions for ordered categorical (Likert-type) items
      with per-item statistics and counts.
usesNative: true
minApp: 1.0.8

