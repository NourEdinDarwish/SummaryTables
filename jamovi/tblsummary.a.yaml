---
name: tblSummary
title: Table Summary
menuGroup: Summary Tables
version: "1.0.0"
jas: "1.2"

options:
  - name: data
    type: Data

  - name: vars_cont
    title: Continuous Variables
    type: Variables
    suggested:
      - continuous
    permitted:
      - numeric

  - name: vars_cat
    title: Categorical Variables
    type: Variables
    suggested:
      - nominal
      - ordinal
    permitted:
      - factor
      - numeric

  - name: by
    title: Group by
    type: Variable
    suggested:
      - nominal
      - ordinal
      - id

  - name: stat_cont_global
    title: Global Continuous Stat
    type: List
    options:
      - title: Mean (SD)
        name: mean_sd
      - title: Median (IQR)
        name: median_iqr
      - title: Range
        name: range
    default: mean_sd

  - name: stats_cont_specific
    title: Specific Continuous Stats
    type: Array
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: stat
          title: Statistic
          type: List
          options:
            - title: Use Global
              name: use_global
            - title: Mean (SD)
              name: mean_sd
            - title: Median (IQR)
              name: median_iqr
            - title: Range
              name: range
          default: use_global

  - name: stat_cat_global
    title: Global Categorical Stat
    type: List
    options:
      - title: n (%)
        name: n_percent
      - title: n/N (%)
        name: n_total_percent
    default: n_percent

  - name: stats_cat_specific
    title: Specific Categorical Stats
    type: Array
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: stat
          title: Statistic
          type: List
          options:
            - title: Use Global
              name: use_global
            - title: n (%)
              name: n_percent
            - title: n/N (%)
              name: n_total_percent
          default: use_global

  - name: missing
    title: Missing Values
    type: List
    options:
      - title: If any
        name: ifany
      - title: No
        name: no
      - title: Always
        name: always
    default: ifany

  - name: missingText
    title: Missing Text
    type: String
    default: Unknown

  - name: percent
    title: Percent Type
    type: List
    options:
      - title: Column
        name: column
      - title: Row
        name: row
      - title: Cell
        name: cell
    default: column

  - name: p_value
    title: Add p-value
    type: Bool
    default: false

  - name: exportWord
    title: Save to Word
    type: Bool
    default: false

  - name: exportPath
    title: Export path
    type: String
    default: ~/Desktop/summary_table.docx
