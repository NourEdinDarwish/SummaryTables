---
name: tblSummary
title: Table Summary
menuGroup: Summary Tables
version: "1.0.0"
jas: "1.2"

options:
  - name: data
    type: Data

  - name: varsCont
    title: Continuous Variables
    type: Variables
    suggested:
      - continuous
    permitted:
      - numeric

  - name: varsCat
    title: Categorical Variables
    type: Variables
    suggested:
      - nominal
      - ordinal
    permitted:
      - factor
      - id

  - name: groupBy
    title: Grouping Variable
    type: Variable
    suggested:
      - nominal
      - ordinal
    permitted:
      - factor
      - id

  - name: addN
    title: Add N column
    type: Bool
    default: false

  - name: addNLast
    title: Place last
    type: Bool
    default: false

  - name: addNFootnote
    title: Show footnote
    type: Bool
    default: true

  - name: addOverall
    title: Add overall column (requires Grouping Variable)
    type: Bool
    default: false

  - name: addOverallLast
    title: Place last
    type: Bool
    default: false

  - name: missing
    title: Visibility
    type: List
    options:
      - title: Show if present
        name: ifany
      - title: Hide
        name: no
      - title: Always show
        name: always
    default: ifany

  - name: missingText
    title: Label
    type: String
    default: Unknown

  - name: missingStat
    title: Statistic
    type: List
    options:
      - title: Count
        name: n
      - title: Count (%)
        name: nPercent
      - title: "%"
        name: percent
    default: n

  - name: journal
    title: Theme
    type: List
    options:
      - title: Default
        name: none
      - title: JAMA
        name: jama
      - title: The Lancet
        name: lancet
      - title: The New England Journal of Medicine
        name: nejm
      - title: The Quarterly Journal of Economics
        name: qjecon
    default: none

  - name: compact
    title: Compact
    type: Bool
    default: false

  - name: language
    title: Language
    type: List
    options:
      - title: Chinese (Simplified)
        name: zh-cn
      - title: Chinese (Traditional)
        name: zh-tw
      - title: Dutch
        name: nl
      - title: English
        name: en
      - title: French
        name: fr
      - title: German
        name: de
      - title: Gujarati
        name: gu
      - title: Hindi
        name: hi
      - title: Icelandic
        name: is
      - title: Japanese
        name: ja
      - title: Korean
        name: kr
      - title: Marathi
        name: mr
      - title: Norwegian
        name: no
      - title: Portuguese
        name: pt
      - title: Spanish
        name: es
      - title: Swedish
        name: se
    default: en

  - name: boldLabels
    title: Bold labels
    type: Bool
    default: false

  - name: boldLevels
    title: Bold levels
    type: Bool
    default: false

  - name: italicizeLabels
    title: Italicize labels
    type: Bool
    default: false

  - name: italicizeLevels
    title: Italicize levels
    type: Bool
    default: false

  - name: sortCatDefault
    title: Default level order
    type: List
    options:
      - title: As defined
        name: alphanumeric
      - title: Frequency
        name: frequency
    default: alphanumeric

  - name: sortCatSpecific
    title: Specific level order
    type: Array
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: sort
          title: Level order
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: As defined
              name: alphanumeric
            - title: Frequency
              name: frequency
          default: use_default

  - name: statContDefault
    title: Default statistic
    type: List
    options:
      - title: Mean (SD)
        name: meanSd
      - title: Median (IQR)
        name: medianIqr
      - title: Median (Range)
        name: medianRange
      - title: Mean
        name: mean
      - title: Median
        name: median
      - title: All
        name: eda
    default: meanSd

  - name: statsContSpecific
    title: Specific statistics
    type: Array
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: stat
          title: Statistic
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: Mean (SD)
              name: meanSd
            - title: Median (IQR)
              name: medianIqr
            - title: Median (Range)
              name: medianRange
            - title: Mean
              name: mean
            - title: Median
              name: median
            - title: All
              name: eda
          default: use_default

  - name: digitsCont
    title: Decimal places
    type: List
    options:
      - title: Auto
        name: auto
      - title: "0"
        name: "0"
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
      - title: "4"
        name: "4"
      - title: "5"
        name: "5"
    default: auto

  - name: statCatDefault
    title: Default statistic
    type: List
    options:
      - title: Count (%)
        name: nPercent
      - title: Count
        name: n
      - title: "%"
        name: percent
    default: nPercent

  - name: statsCatSpecific
    title: Specific statistics
    type: Array
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: stat
          title: Statistic
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: Count (%)
              name: nPercent
            - title: Count
              name: n
            - title: "%"
              name: percent
          default: use_default

  - name: digitsPct
    title: Decimal places (percentage)
    type: List
    options:
      - title: Auto
        name: auto
      - title: "0"
        name: "0"
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
      - title: "4"
        name: "4"
      - title: "5"
        name: "5"
    default: auto

  - name: percent
    title: Percentage type (requires Grouping Variable)
    type: List
    options:
      - title: Column %
        name: column
      - title: Row %
        name: row
      - title: Total %
        name: cell
    default: column

  - name: addDiff
    title: Add difference (requires Grouping Variable with exactly 2 levels)
    type: Bool
    default: false

  - name: diffConfLevel
    title: Confidence level
    type: Number
    min: 50
    max: 99.9
    default: 95

  - name: diffDigitsPvalue
    title: Decimal places (large p-values)
    type: List
    options:
      - title: Auto
        name: auto
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
    default: auto

  - name: boldDiffP
    title: Bold significant p-values
    type: Bool
    default: false

  - name: boldDiffPThreshold
    title: Significance threshold
    type: Number
    min: 0
    max: 1
    default: 0.05

  - name: separateDiffFootnotes
    title: Separate p-value footnotes
    type: Bool
    default: false

  - name: diffMethodContDefault
    title: Default method
    type: List
    options:
      - title: t-test
        name: t.test
      - title: t-test (equal variance)
        name: t.test.student
      - title: Wilcoxon rank-sum
        name: wilcox.test
      - title: "Cohen's D"
        name: cohens_d
      - title: "Hedge's G"
        name: hedges_g
      - title: SMD
        name: smd
    default: t.test

  - name: diffMethodsContSpecific
    title: Specific methods
    type: Array
    default: []
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: method
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: t-test
              name: t.test
            - title: t-test (equal variance)
              name: t.test.student
            - title: Wilcoxon rank-sum
              name: wilcox.test
            - title: "Cohen's D"
              name: cohens_d
            - title: "Hedge's G"
              name: hedges_g
            - title: SMD
              name: smd
          default: use_default

  - name: diffDigitsCont
    title: Decimal places (difference & CI)
    type: List
    options:
      - title: Auto
        name: auto
      - title: "0"
        name: "0"
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
      - title: "4"
        name: "4"
      - title: "5"
        name: "5"
    default: auto

  - name: diffMethodDichotDefault
    title: Default method
    type: List
    options:
      - title: Z test (proportions)
        name: prop.test
      - title: SMD
        name: smd
    default: prop.test

  - name: diffMethodsDichotSpecific
    title: Specific methods
    type: Array
    default: []
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: method
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: Z test (proportions)
              name: prop.test
            - title: SMD
              name: smd
          default: use_default

  - name: diffDigitsDichot
    title: Decimal places (difference & CI)
    type: List
    options:
      - title: Auto
        name: auto
      - title: "0"
        name: "0"
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
      - title: "4"
        name: "4"
      - title: "5"
        name: "5"
    default: auto

  - name: diffDigitsCat
    title: Decimal places (SMD)
    type: List
    options:
      - title: Auto
        name: auto
      - title: "0"
        name: "0"
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
      - title: "4"
        name: "4"
      - title: "5"
        name: "5"
    default: auto

  - name: pValue
    title: Add p-value (requires Grouping Variable)
    type: Bool
    default: false

  - name: digitsPvalue
    title: Decimal places (large p-values)
    type: List
    options:
      - title: Auto
        name: auto
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
    default: auto

  - name: boldP
    title: Bold significant p-values
    type: Bool
    default: false

  - name: boldPThreshold
    title: Significance threshold
    type: Number
    min: 0
    max: 1
    default: 0.05

  - name: separatePFootnotes
    title: Separate p-value footnotes
    type: Bool
    default: false

  - name: testContDefault
    title: Default test
    type: List
    options:
      - title: Parametric (t-test / ANOVA)
        name: parametric
      - title: Non-parametric (Wilcoxon rank-sum / Kruskal-Wallis)
        name: nonparametric
      - title: t-test
        name: t.test
      - title: t-test (equal variance)
        name: t.test.student
      - title: ANOVA
        name: oneway.test
      - title: ANOVA (equal variance)
        name: oneway.test.classical
      - title: Wilcoxon rank-sum
        name: wilcox.test
      - title: Kruskal-Wallis
        name: kruskal.test
    default: parametric

  - name: testsContSpecific
    title: Specific tests
    type: Array
    default: []
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: test
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: t-test
              name: t.test
            - title: t-test (equal variance)
              name: t.test.student
            - title: ANOVA
              name: oneway.test
            - title: ANOVA (equal variance)
              name: oneway.test.classical
            - title: Wilcoxon rank-sum
              name: wilcox.test
            - title: Kruskal-Wallis
              name: kruskal.test
          default: use_default

  - name: testCatDefault
    title: Default test
    type: List
    options:
      - title: Chi-square / Fisher's exact test
        name: auto
      - title: Chi-square
        name: chisq.test.no.correct
      - title: Chi-square (continuity correction)
        name: chisq.test
      - title: Fisher's exact test
        name: fisher.test
    default: auto

  - name: testsCatSpecific
    title: Specific tests
    type: Array
    default: []
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: test
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: Chi-square
              name: chisq.test.no.correct
            - title: Chi-square (continuity correction)
              name: chisq.test
            - title: Fisher's exact test
              name: fisher.test
          default: use_default

  - name: addQ
    title: Add q-value (requires p-value)
    type: Bool
    default: false

  - name: qMethod
    title: Method
    type: List
    options:
      - title: Benjamini-Hochberg
        name: BH
      - title: Benjamini-Yekutieli
        name: BY
      - title: Bonferroni
        name: bonferroni
      - title: Holm
        name: holm
      - title: Hochberg
        name: hochberg
      - title: Hommel
        name: hommel
      - title: None
        name: none
    default: BH

  - name: boldQ
    title: Bold significant q-values
    type: Bool
    default: false

  - name: boldQThreshold
    title: Significance threshold
    type: Number
    min: 0
    max: 1
    default: 0.05

  - name: addCi
    title: Add confidence interval
    type: Bool
    default: false

  - name: confLevel
    title: Confidence level
    type: Number
    min: 50
    max: 99.9
    default: 95

  - name: ciCombine
    title: Merge with statistic column
    type: Bool
    default: false

  - name: ciMethodContDefault
    title: Default method
    type: List
    options:
      - title: t-test (mean)
        name: t.test
      - title: Wilcoxon signed-rank (pseudomedian)
        name: wilcox.test
    default: t.test

  - name: ciMethodsContSpecific
    title: Specific methods
    type: Array
    default: []
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: method
          title: Method
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: t-test (mean)
              name: t.test
            - title: Wilcoxon signed-rank (pseudomedian)
              name: wilcox.test
          default: use_default

  - name: ciDigitsCont
    title: Decimal places
    type: List
    options:
      - title: Auto
        name: auto
      - title: "0"
        name: "0"
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
      - title: "4"
        name: "4"
      - title: "5"
        name: "5"
    default: auto

  - name: ciMethodCatDefault
    title: Default method
    type: List
    options:
      - title: Wilson (continuity correction)
        name: wilson
      - title: Wilson
        name: wilson.no.correct
      - title: Exact (Clopper-Pearson)
        name: exact
      - title: Wald (continuity correction)
        name: wald
      - title: Wald
        name: wald.no.correct
      - title: Agresti-Coull
        name: agresti.coull
      - title: Jeffreys
        name: jeffreys
    default: wilson

  - name: ciMethodsCatSpecific
    title: Specific methods
    type: Array
    default: []
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: method
          title: Method
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: Wilson (continuity correction)
              name: wilson
            - title: Wilson
              name: wilson.no.correct
            - title: Exact (Clopper-Pearson)
              name: exact
            - title: Wald (continuity correction)
              name: wald
            - title: Wald
              name: wald.no.correct
            - title: Agresti-Coull
              name: agresti.coull
            - title: Jeffreys
              name: jeffreys
          default: use_default

  - name: ciDigitsCat
    title: Decimal places
    type: List
    options:
      - title: Auto
        name: auto
      - title: "0"
        name: "0"
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
      - title: "4"
        name: "4"
      - title: "5"
        name: "5"
    default: auto

  - name: export
    title: Save
    type: Bool
    default: false

  - name: path
    title: Path
    type: String
    default: ~/Desktop/Summary Table.docx
