---
name: tblSummary
title: Table Summary
menuGroup: Summary Tables
version: "1.0.0"
jas: "1.2"

options:
  - name: data
    type: Data

  - name: varsCont
    title: Continuous Variables
    type: Variables
    suggested:
      - continuous
    permitted:
      - numeric

  - name: varsCat
    title: Categorical Variables
    type: Variables
    suggested:
      - nominal
      - ordinal
    permitted:
      - factor
      - id

  - name: groupBy
    title: Group by
    type: Variable
    suggested:
      - nominal
      - ordinal

  - name: missing
    title: Missing Values
    type: List
    options:
      - title: Show if present
        name: ifany
      - title: Hide
        name: no
      - title: Always show
        name: always
    default: ifany

  - name: missingText
    title: Label for missing data
    type: String
    default: Unknown

  - name: percent
    title: Percent Type
    type: List
    options:
      - title: Column %
        name: column
      - title: Row %
        name: row
      - title: Total %
        name: cell
    default: column

  - name: journal
    title: Journal Style
    type: List
    options:
      - title: Default
        name: none
      - title: JAMA
        name: jama
      - title: The Lancet
        name: lancet
      - title: NEJM
        name: nejm
      - title: QJEcon
        name: qjecon
    default: none

  - name: compact
    title: Compact Display
    type: Bool
    default: false

  - name: language
    title: Language
    type: List
    options:
      - title: English
        name: en
      - title: German
        name: de
      - title: Spanish
        name: es
      - title: French
        name: fr
      - title: Gujarati
        name: gu
      - title: Hindi
        name: hi
      - title: Icelandic
        name: is
      - title: Japanese
        name: ja
      - title: Korean
        name: kr
      - title: Marathi
        name: mr
      - title: Dutch
        name: nl
      - title: Norwegian
        name: no
      - title: Portuguese
        name: pt
      - title: Swedish
        name: se
      - title: Chinese (Simplified)
        name: zh-cn
      - title: Chinese (Traditional)
        name: zh-tw
    default: en

  - name: statContDefault
    title: Default Continuous Statistic
    type: List
    options:
      - title: Mean (SD)
        name: mean_sd
      - title: Median (IQR)
        name: median_iqr
      - title: Range
        name: range
    default: mean_sd

  - name: statsContSpecific
    title: Specific Continuous Stats
    type: Array
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: stat
          title: Statistic
          type: List
          options:
            - title: Use Default
              name: use_default
            - title: Mean (SD)
              name: mean_sd
            - title: Median (IQR)
              name: median_iqr
            - title: Range
              name: range
          default: use_default

  - name: statCatDefault
    title: Default Categorical Statistic
    type: List
    options:
      - title: n (%)
        name: n_percent
      - title: n/N (%)
        name: n_total_percent
    default: n_percent

  - name: statsCatSpecific
    title: Specific Categorical Stats
    type: Array
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: stat
          title: Statistic
          type: List
          options:
            - title: Use Default
              name: use_default
            - title: n (%)
              name: n_percent
            - title: n/N (%)
              name: n_total_percent
          default: use_default

  - name: pValue
    title: Add p-value
    type: Bool
    default: false

  - name: testContDefault
    title: Default Continuous Test
    type: List
    options:
      - title: Parametric (t-test / ANOVA)
        name: parametric
      - title: Non-parametric (Wilcoxon / Kruskal-Wallis)
        name: nonparametric
      - title: Student's t-test
        name: t.test
      - title: One-way ANOVA
        name: oneway.test
      - title: Paired t-test
        name: paired.t.test
      - title: Wilcoxon rank-sum
        name: wilcox.test
      - title: Kruskal-Wallis
        name: kruskal.test
      - title: Paired Wilcoxon rank-sum
        name: paired.wilcox.test
      - title: Mood's two-sample test of scale
        name: mood.test
      - title: ANCOVA
        name: ancova
      - title: Random intercept logistic
        name: lme4
    default: parametric
  - name: testsContSpecific
    title: Specific Tests
    type: Array
    default: []
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: test
          type: List
          options:
            - title: Use Default
              name: use_default
            - title: Parametric (t-test / ANOVA)
              name: parametric
            - title: Non-parametric (Wilcoxon / Kruskal-Wallis)
              name: nonparametric
            - title: Student's t-test
              name: t.test
            - title: One-way ANOVA
              name: oneway.test
            - title: Paired t-test
              name: paired.t.test
            - title: Wilcoxon rank-sum
              name: wilcox.test
            - title: Kruskal-Wallis
              name: kruskal.test
            - title: Paired Wilcoxon rank-sum
              name: paired.wilcox.test
            - title: Mood's two-sample test of scale
              name: mood.test
            - title: ANCOVA
              name: ancova
            - title: Random intercept logistic
              name: lme4
          default: use_default
  - name: testCatDefault
    title: Default Categorical Test
    type: List
    options:
      - title: Chi-square / Fisher's (auto)
        name: auto
      - title: Chi-square
        name: chisq.test.no.correct
      - title: Chi-square (continuity correction)
        name: chisq.test
      - title: Fisher's exact
        name: fisher.test
      - title: McNemar's test
        name: mcnemar.test
      - title: McNemar's test (wide)
        name: mcnemar.test.wide
      - title: Test for equality of proportions
        name: prop.test
      - title: Random intercept logistic
        name: lme4
    default: auto
  - name: testsCatSpecific
    title: Specific Tests
    type: Array
    default: []
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: test
          type: List
          options:
            - title: Use Default
              name: use_default
            - title: Chi-square
              name: chisq.test.no.correct
            - title: Chi-square (continuity correction)
              name: chisq.test
            - title: Fisher's exact
              name: fisher.test
            - title: McNemar's test
              name: mcnemar.test
            - title: McNemar's test (wide)
              name: mcnemar.test.wide
            - title: Test for equality of proportions
              name: prop.test
            - title: Random intercept logistic
              name: lme4
          default: use_default

  - name: export
    title: Save to Word
    type: Bool
    default: false

  - name: path
    title: Export path
    type: String
    default: ~/Desktop/summary_table.docx
