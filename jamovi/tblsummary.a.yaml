---
name: tblSummary
title: Table Summary
menuGroup: Summary Tables
version: "1.0.0"
jas: "1.2"

options:
  - name: data
    type: Data

  - name: varsCont
    title: Continuous Variables
    type: Variables
    suggested:
      - continuous
    permitted:
      - numeric

  - name: varsCat
    title: Categorical Variables
    type: Variables
    suggested:
      - nominal
      - ordinal
    permitted:
      - factor
      - id

  - name: groupBy
    title: Grouping Variable
    type: Variable
    suggested:
      - nominal
      - ordinal
    permitted:
      - factor
      - id

  - name: missing
    title: Missing Values
    type: List
    options:
      - title: Show if present
        name: ifany
      - title: Hide
        name: no
      - title: Always show
        name: always
    default: ifany

  - name: missingText
    title: Label for missing data
    type: String
    default: Unknown

  - name: percent
    title: Percent Type
    type: List
    options:
      - title: Column %
        name: column
      - title: Row %
        name: row
      - title: Total %
        name: cell
    default: column

  - name: journal
    title: Theme
    type: List
    options:
      - title: Default
        name: none
      - title: JAMA
        name: jama
      - title: The Lancet
        name: lancet
      - title: The New England Journal of Medicine
        name: nejm
      - title: The Quarterly Journal of Economics
        name: qjecon
    default: none

  - name: compact
    title: Compact
    type: Bool
    default: false

  - name: language
    title: Language
    type: List
    options:
      - title: Chinese (Simplified)
        name: zh-cn
      - title: Chinese (Traditional)
        name: zh-tw
      - title: Dutch
        name: nl
      - title: English
        name: en
      - title: French
        name: fr
      - title: German
        name: de
      - title: Gujarati
        name: gu
      - title: Hindi
        name: hi
      - title: Icelandic
        name: is
      - title: Japanese
        name: ja
      - title: Korean
        name: kr
      - title: Marathi
        name: mr
      - title: Norwegian
        name: no
      - title: Portuguese
        name: pt
      - title: Spanish
        name: es
      - title: Swedish
        name: se
    default: en

  - name: boldLabels
    title: Bold labels
    type: Bool
    default: false

  - name: boldLevels
    title: Bold levels
    type: Bool
    default: false

  - name: italicizeLabels
    title: Italicize labels
    type: Bool
    default: false

  - name: italicizeLevels
    title: Italicize levels
    type: Bool
    default: false

  - name: sortCatDefault
    title: Default Level Order
    type: List
    options:
      - title: As defined
        name: alphanumeric
      - title: Frequency
        name: frequency
    default: alphanumeric

  - name: sortCatSpecific
    title: Specific Level Order
    type: Array
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: sort
          title: Level Order
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: As defined
              name: alphanumeric
            - title: Frequency
              name: frequency
          default: use_default

  - name: statContDefault
    title: Default Continuous Statistic
    type: List
    options:
      - title: Mean (SD)
        name: meanSd
      - title: Median (IQR)
        name: medianIqr
      - title: Median (Range)
        name: medianRange
    default: meanSd

  - name: statsContSpecific
    title: Specific Continuous Statistics
    type: Array
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: stat
          title: Statistic
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: Mean (SD)
              name: meanSd
            - title: Median (IQR)
              name: medianIqr
            - title: Median (Range)
              name: medianRange
          default: use_default

  - name: digitsCont
    title: Decimal places
    type: List
    options:
      - title: Auto (theme-aware)
        name: auto
      - title: "0"
        name: "0"
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
    default: auto

  - name: statCatDefault
    title: Default Categorical Statistic
    type: List
    options:
      - title: n (%)
        name: nPercent
      - title: n
        name: n
      - title: "%"
        name: percent
    default: nPercent

  - name: statsCatSpecific
    title: Specific Categorical Statistics
    type: Array
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: stat
          title: Statistic
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: n (%)
              name: nPercent
            - title: n
              name: n
            - title: "%"
              name: percent
          default: use_default

  - name: digitsPct
    title: Decimal places (percentage)
    type: List
    options:
      - title: Auto (theme-aware)
        name: auto
      - title: "0"
        name: "0"
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
    default: auto

  - name: pValue
    title: Add p-value
    type: Bool
    default: false

  - name: digitsPvalue
    title: Decimal places (large p-values)
    type: List
    options:
      - title: Auto (theme-aware)
        name: auto
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
    default: auto

  - name: boldP
    title: Bold significant p-values
    type: Bool
    default: false

  - name: boldPThreshold
    title: Significance threshold
    type: Number
    min: 0
    max: 1
    default: 0.05

  - name: separatePFootnotes
    title: Separate p-value footnotes
    type: Bool
    default: false

  - name: testContDefault
    title: Default Continuous Test
    type: List
    options:
      - title: Parametric (t-test / ANOVA)
        name: parametric
      - title: Non-parametric (Wilcoxon / Kruskal-Wallis)
        name: nonparametric
      - title: Student's t-test
        name: t.test
      - title: One-way ANOVA
        name: oneway.test
      - title: Paired t-test
        name: paired.t.test
      - title: Wilcoxon rank-sum
        name: wilcox.test
      - title: Kruskal-Wallis
        name: kruskal.test
      - title: Paired Wilcoxon rank-sum
        name: paired.wilcox.test
      - title: Mood's two-sample test of scale
        name: mood.test
      - title: ANCOVA
        name: ancova
      - title: Random intercept logistic
        name: lme4
    default: parametric

  - name: testsContSpecific
    title: Specific Tests
    type: Array
    default: []
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: test
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: Parametric (t-test / ANOVA)
              name: parametric
            - title: Non-parametric (Wilcoxon / Kruskal-Wallis)
              name: nonparametric
            - title: Student's t-test
              name: t.test
            - title: One-way ANOVA
              name: oneway.test
            - title: Paired t-test
              name: paired.t.test
            - title: Wilcoxon rank-sum
              name: wilcox.test
            - title: Kruskal-Wallis
              name: kruskal.test
            - title: Paired Wilcoxon rank-sum
              name: paired.wilcox.test
            - title: Mood's two-sample test of scale
              name: mood.test
            - title: ANCOVA
              name: ancova
            - title: Random intercept logistic
              name: lme4
          default: use_default

  - name: testCatDefault
    title: Default Categorical Test
    type: List
    options:
      - title: Chi-square / Fisher's (auto)
        name: auto
      - title: Chi-square
        name: chisq.test.no.correct
      - title: Chi-square (continuity correction)
        name: chisq.test
      - title: Fisher's exact
        name: fisher.test
      - title: McNemar's test
        name: mcnemar.test
      - title: McNemar's test (wide)
        name: mcnemar.test.wide
      - title: Test for equality of proportions
        name: prop.test
      - title: Random intercept logistic
        name: lme4
    default: auto

  - name: testsCatSpecific
    title: Specific Tests
    type: Array
    default: []
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: test
          type: List
          options:
            - title: Same as default
              name: use_default
            - title: Chi-square
              name: chisq.test.no.correct
            - title: Chi-square (continuity correction)
              name: chisq.test
            - title: Fisher's exact
              name: fisher.test
            - title: McNemar's test
              name: mcnemar.test
            - title: McNemar's test (wide)
              name: mcnemar.test.wide
            - title: Test for equality of proportions
              name: prop.test
            - title: Random intercept logistic
              name: lme4
          default: use_default

  - name: export
    title: Save
    type: Bool
    default: false

  - name: path
    title: Path
    type: String
    default: ~/Desktop/Summary Table.docx
