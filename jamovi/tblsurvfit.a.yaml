name: tblSurvfit
title: Survival Table
menuGroup: Summary Tables
menuTitle: Survival Table
version: "1.0.0"
jas: "1.2"

options:
  - name: data
    type: Data

  - name: elapsed
    title: Time Elapsed
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: event
    title: Event
    type: Variable
    suggested:
      - continuous
      - nominal
    permitted:
      - factor
      - numeric

  - name: eventLevel
    title: Event level
    type: Level
    variable: (event)

  - name: strata
    title: Stratifying Variables
    type: Variables
    suggested:
      - nominal
    permitted:
      - factor

  - name: statistic
    title: Statistic
    type: List
    options:
      - title: Estimates at specific times
        name: times
      - title: Median survival time
        name: median
    default: times

  - name: times
    title: Time points
    type: String
    default: "12, 24"

  - name: timeSuffix
    title: Suffix
    type: String
    default: "-Month"

  - name: type
    title: Estimate type
    type: List
    options:
      - title: Survival probability
        name: survival
      - title: "Cumulative incidence (1 − S)"
        name: risk
      - title: "Cumulative hazard (−log S)"
        name: cumhaz
    default: survival

  - name: digitsEstimate
    title: Decimal places
    type: List
    options:
      - title: Auto
        name: auto
      - title: "0"
        name: "0"
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
      - title: "4"
        name: "4"
      - title: "5"
        name: "5"
    default: auto

  - name: confLevel
    title: Confidence level
    type: Number
    min: 50
    max: 99.9
    default: 95

  - name: addN
    title: Add N column
    type: Bool
    default: false

  - name: addNEvent
    title: Add event N column
    type: Bool
    default: false

  - name: addPvalue
    title: Add p-value (requires Stratifying Variables)
    type: Bool
    default: false

  - name: testDefault
    title: Default test
    type: List
    options:
      - title: Log-rank
        name: logrank
      - title: Peto & Peto
        name: petopeto_gehanwilcoxon
      - title: Cox regression (likelihood ratio)
        name: coxph_lrt
      - title: Cox regression (Wald)
        name: coxph_wald
      - title: Cox regression (score)
        name: coxph_score
    default: logrank

  - name: testSpecific
    title: Specific tests
    type: Array
    template:
      type: Group
      elements:
        - name: var
          type: Variable
        - name: test
          type: List
          options:
            - title: Same as default
              name: useDefault
            - title: Log-rank
              name: logrank
            - title: Peto & Peto
              name: petopeto_gehanwilcoxon
            - title: Cox regression (likelihood ratio)
              name: coxph_lrt
            - title: Cox regression (Wald)
              name: coxph_wald
            - title: Cox regression (score)
              name: coxph_score
          default: useDefault

  - name: digitsPvalue
    title: Decimal places (large p-values)
    type: List
    options:
      - title: Auto
        name: auto
      - title: "1"
        name: "1"
      - title: "2"
        name: "2"
      - title: "3"
        name: "3"
    default: auto

  - name: boldPvalue
    title: Bold significant p-values
    type: Bool
    default: false

  - name: boldPvalueThreshold
    title: Significance threshold
    type: Number
    min: 0
    max: 1
    default: 0.05

  - name: addQ
    title: Add q-value (requires p-value)
    type: Bool
    default: false

  - name: qMethod
    title: Method
    type: List
    options:
      - title: Benjamini-Hochberg
        name: BH
      - title: Benjamini-Yekutieli
        name: BY
      - title: Bonferroni
        name: bonferroni
      - title: Holm
        name: holm
      - title: Hochberg
        name: hochberg
      - title: Hommel
        name: hommel
      - title: None
        name: none
    default: BH

  - name: boldQ
    title: Bold significant q-values
    type: Bool
    default: false

  - name: boldQThreshold
    title: Significance threshold
    type: Number
    min: 0
    max: 1
    default: 0.05

  - name: journal
    title: Theme
    type: List
    options:
      - title: Default
        name: default
      - title: JAMA
        name: jama
      - title: The Lancet
        name: lancet
      - title: The New England Journal of Medicine
        name: nejm
      - title: The Quarterly Journal of Economics
        name: qjecon
    default: default

  - name: compact
    title: Compact
    type: Bool
    default: false

  - name: language
    title: Language
    type: List
    options:
      - title: Chinese (Simplified)
        name: zh-cn
      - title: Chinese (Traditional)
        name: zh-tw
      - title: Dutch
        name: nl
      - title: English
        name: en
      - title: French
        name: fr
      - title: German
        name: de
      - title: Gujarati
        name: gu
      - title: Hindi
        name: hi
      - title: Icelandic
        name: is
      - title: Japanese
        name: ja
      - title: Korean
        name: kr
      - title: Marathi
        name: mr
      - title: Norwegian
        name: no
      - title: Portuguese
        name: pt
      - title: Spanish
        name: es
      - title: Swedish
        name: se
    default: en

  - name: boldLabels
    title: Bold labels
    type: Bool
    default: false

  - name: boldLevels
    title: Bold levels
    type: Bool
    default: false

  - name: italicizeLabels
    title: Italicize labels
    type: Bool
    default: false

  - name: italicizeLevels
    title: Italicize levels
    type: Bool
    default: false

