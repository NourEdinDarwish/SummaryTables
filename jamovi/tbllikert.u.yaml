name: tblLikert
title: Likert Table
jus: "3.0"
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
  - type: CollapseBox
    label: General
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: none
        children:
          - type: ComboBox
            name: statistic
      - type: ListBox
        name: statSpecific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: large
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            maxWidth: 300
            template:
              type: VariableLabel
          - name: stat
            label: Statistic
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ""
      - type: ComboBox
        name: digits
      - type: LayoutBox
        margin: none
        children:
          - type: ComboBox
            name: levelOrder
      - type: CheckBox
        name: addN
        children:
          - type: CheckBox
            name: addNLast
            enable: (addN)
          - type: CheckBox
            name: addNFootnote
            enable: (addN)
  - type: CollapseBox
    label: Appearance
    collapsed: true
    stretchFactor: 1
    children:
      - type: ComboBox
        name: journal
      - type: CheckBox
        name: compact
      - type: ComboBox
        name: language
      - type: CheckBox
        name: boldLabels
      - type: CheckBox
        name: italicizeLabels
  - type: CollapseBox
    label: Help
    collapsed: true
    stretchFactor: 1
    children:
      - type: Label
        label: Documentation coming soon.
        heading: true
      - type: Label
        label: This module is actively being developed.
        heading: false
      - type: Label
        label: "If you encounter any issues, have a question, or have ideas for new features,"
        heading: false
      - type: Label
        label: please open an issue at github.com/NourEdinDarwish/SummaryTables/issues
        heading: false
      - type: Label
        label: or send an email at nouredindarwish@gmail.com
        heading: false
