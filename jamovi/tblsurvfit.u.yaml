name: tblSurvfit
title: Survival Table
jus: "3.0"
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: elapsed
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: event
            maxItemCount: 1
            isTarget: true
          - type: LevelSelector
            name: eventLevel
      - type: TargetLayoutBox
        label: Stratifying Variables
        children:
          - type: VariablesListBox
            name: strata
            isTarget: true

  - type: CollapseBox
    label: Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: Label
        label: Statistic
        children:
          - type: RadioButton
            name: statistic_times
            optionName: statistic
            optionPart: times
            children:
              - type: LayoutBox
                fitToGrid: true
                children:
                  - type: TextBox
                    name: times
                    format: string
                    width: large
                    enable: (statistic:times)
                    cell:
                      row: 0
                      column: 0
                  - type: TextBox
                    name: timeUnit
                    format: string
                    width: large
                    enable: (statistic:times)
                    cell:
                      row: 0
                      column: 1
              - type: LayoutBox
                children:
                  - type: ComboBox
                    name: type
                    enable: (statistic:times)
          - type: RadioButton
            name: statistic_median
            optionName: statistic
            optionPart: median
      - type: LayoutBox
        margin: large
        children:
          - type: LayoutBox
            children:
              - type: ComboBox
                name: digitsEstimate
              - type: TextBox
                name: confLevel
                suffix: "%"
                format: number
          - type: CheckBox
            name: addN
          - type: CheckBox
            name: addNEvent

  - type: CollapseBox
    label: Appearance
    collapsed: true
    stretchFactor: 1
    children:
      - type: ComboBox
        name: journal
      - type: CheckBox
        name: compact
      - type: ComboBox
        name: language
      - type: LayoutBox
        fitToGrid: true
        children:
          - type: CheckBox
            name: boldLabels
            cell:
              row: 0
              column: 0
          - type: CheckBox
            name: boldLevels
            cell:
              row: 0
              column: 1
          - type: CheckBox
            name: italicizeLabels
            cell:
              row: 1
              column: 0
          - type: CheckBox
            name: italicizeLevels
            cell:
              row: 1
              column: 1

  - type: CollapseBox
    label: Save to Word
    collapsed: true
    stretchFactor: 1
    children:
      - type: TextBox
        name: path
        format: string
        stretchFactor: 1
      - type: ActionButton
        name: export

  - type: CollapseBox
    label: Help
    collapsed: true
    stretchFactor: 1
    children:
      - type: Label
        label: Documentation coming soon.
        heading: true
      - type: Label
        label: This module is actively being developed.
        heading: false
      - type: Label
        label: "If you encounter any issues, have a question, or have ideas for new features,"
        heading: false
      - type: Label
        label: please open an issue at github.com/NourEdinDarwish/SummaryTables/issues
        heading: false
      - type: Label
        label: or send an email at nouredindarwish@gmail.com
        heading: false
