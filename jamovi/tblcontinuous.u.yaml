name: tblContinuous
title: Continuous Summary Table
jus: "3.0"
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: contVar
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: varsCat
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: groupVar
            maxItemCount: 1
            isTarget: true
  - type: CollapseBox
    label: General
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: addOverall
        enable: ({return !!ui['groupVar'].value();})
        children:
          - type: CheckBox
            name: addOverallLast
            enable: ({return !!ui['groupVar'].value() && ui['addOverall'].value();})
  - type: CollapseBox
    label: Appearance
    collapsed: true
    stretchFactor: 1
    children:
      - type: ComboBox
        name: journal
      - type: CheckBox
        name: compact
      - type: ComboBox
        name: language
      - type: LayoutBox
        fitToGrid: true
        children:
          - type: CheckBox
            name: boldLabels
            cell:
              row: 0
              column: 0
          - type: CheckBox
            name: boldLevels
            cell:
              row: 0
              column: 1
          - type: CheckBox
            name: italicizeLabels
            cell:
              row: 1
              column: 0
          - type: CheckBox
            name: italicizeLevels
            cell:
              row: 1
              column: 1
  - type: CollapseBox
    label: Level Order
    collapsed: true
    stretchFactor: 1
    children:
      - type: ComboBox
        name: sortCatDefault
      - type: ListBox
        name: sortCatSpecific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: large
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            maxWidth: 300
            template:
              type: VariableLabel
          - name: sort
            label: Level Order
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ""
  - type: CollapseBox
    label: Statistics
    collapsed: true
    stretchFactor: 1
    children:
      - type: ComboBox
        name: statDefault
      - type: ListBox
        name: statSpecific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: large
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            maxWidth: 300
            template:
              type: VariableLabel
          - name: stat
            label: Statistic
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ""
      - type: ComboBox
        name: digitsCont
  - type: CollapseBox
    label: P-value
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: addPvalue
      - type: LayoutBox
        margin: none
        children:
          - type: ComboBox
            name: testDefault
            enable: (!groupVar && addPvalue)
      - type: ListBox
        name: testSpecific
        showColumnHeaders: true
        fullRowSelect: true
        stretchFactor: 1
        height: large
        columns:
          - name: var
            label: Variable
            selectable: false
            stretchFactor: 1
            maxWidth: 300
            template:
              type: VariableLabel
          - name: test
            label: Test
            selectable: false
            stretchFactor: 1
            template:
              type: ComboBox
              label: ""
      - type: ComboBox
        name: digitsPvalue
        enable: (addPvalue)
      - type: CheckBox
        name: boldPvalue
        enable: (addPvalue)
        children:
          - type: TextBox
            name: boldPvalueThreshold
            format: number
            enable: (addPvalue && boldPvalue)
  - type: CollapseBox
    label: Q-value (P-value Adjustment)
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: addQ
        enable: (addPvalue)
      - type: ComboBox
        name: qMethod
        enable: (addPvalue && addQ)
      - type: CheckBox
        name: boldQ
        enable: (addPvalue && addQ)
        children:
          - type: TextBox
            name: boldQThreshold
            format: number
            enable: (addPvalue && addQ && boldQ)
  - type: CollapseBox
    label: Save to Word
    collapsed: true
    stretchFactor: 1
    children:
      - type: TextBox
        name: path
        format: string
        stretchFactor: 1
      - type: CheckBox
        name: export
