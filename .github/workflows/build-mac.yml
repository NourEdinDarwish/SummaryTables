name: Build macOS Module

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Remove existing build folder (Windows artifacts)
      run: rm -rf build

    - name: Download and Install Jamovi
      run: |
        # Download the latest jamovi for macOS (ARM64 for macos-latest)
        curl -L -O https://www.jamovi.org/downloads/jamovi-2.7.18.0-macos-arm64.dmg
        
        # Mount the DMG
        hdiutil attach jamovi-2.7.18.0-macos-arm64.dmg
        
        # Copy app to Applications
        sudo cp -R "/Volumes/jamovi/jamovi.app" /Applications
        
        # Unmount
        hdiutil detach "/Volumes/jamovi"
        
        echo "Jamovi installed to /Applications/jamovi.app"

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.5.2'

    - name: Install jmvtools and dependencies
      run: |
        install.packages('remotes')
        install.packages('jmvtools', repos=c('https://repo.jamovi.org', 'https://cran.r-project.org'))
        
        # Install module dependencies
        remotes::install_deps(dependencies = TRUE)
      shell: Rscript {0}

    - name: Build Module
      run: |
        # Build the module. We set check=FALSE to skip installing INTO jamovi (which might fail permissions),
        # but the side effect of generating the .jmo should still happen.
        
        library(jmvtools)
        
        tryCatch(
          {
            # Point to the installed Jamovi
            options(jamovi_home = '/Applications/jamovi.app')
            jmvtools::install()
          },
          error = function(e) {
            message("Install process returned error (expected in CI environment):")
            message(e)
          }
        )
      shell: Rscript {0}

    - name: Verify JMO created
      run: |
        if ls *.jmo 1> /dev/null 2>&1; then
          echo "JMO file found."
        else
          echo "Error: JMO file was not created."
          exit 1
        fi

    - name: Upload JMO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-module
        path: "*.jmo"
